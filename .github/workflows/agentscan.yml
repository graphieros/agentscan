name: AgentScan

on:
  workflow_dispatch: # Allow manual trigger
  pull_request_target:
    types: [opened, reopened]
  issues:
    types: [opened]

jobs:
  agentscan:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      issues: write
      contents: read
    steps:
      - name: AgentScan
        uses: MatteoGabriele/agentscan-action@98e87c8f1db0cdcd923f5eb756cc40582ce9abff
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          skip-members: "MatteoGabriele,graphieros"
          auto-close: true
